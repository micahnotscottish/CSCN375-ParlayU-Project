<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ParleyU — Dashboard</title>
  <meta name="description" content="User dashboard for ParleyU — place predictions, view bets, and check your balance." />
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">
        <h1 class="logo">ParleyU</h1>
        <p class="tag">Dashboard</p>
      </div>
      <nav class="site-nav" aria-label="User navigation">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="#account">Account</a></li>
          <li><a href="#markets">Markets</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main id="main" class="container">
    <section id="account" class="card" style="margin-bottom:18px;">
      <h2>Welcome, Student</h2>
      <p class="muted">Member since: 2025</p>
      <div class="account-row" style="display:flex;gap:16px;align-items:center;margin-top:12px;flex-wrap:wrap;">
        <div>
          <p class="muted">Account balance</p>
          <p id="balance" style="font-size:1.5rem;font-weight:800;">$25.00</p>
        </div>
        <div style="margin-left:auto;display:flex;gap:8px;flex-wrap:wrap;">
          <button class="btn primary" id="placeBet">Place Bet</button>
          <button class="btn" id="viewBets">View Bets</button>
          <button class="btn" id="deposit">Deposit</button>
          <button class="btn" id="withdraw">Withdraw</button>
        </div>
      </div>
    </section>

    <section id="markets" class="container">
      <h3>Active Markets</h3>
      <!-- grid will be filled dynamically from JSON -->
      <div class="grid"></div>
    </section>

    <section id="recent" class="container">
      <h3>Your Recent Bets</h3>
      <div id="betsList">
        <p class="muted">No bets placed yet.</p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p class="muted">Signed in as <strong>student@example.edu</strong></p>
    </div>
  </footer>

  <script>
    // Centralized dashboard interactions with system-controlled betting flow
    const balanceEl = document.getElementById('balance');
    const betsList = document.getElementById('betsList');
    let balance = 25.00;
    let recentBets = [];
    const updateBalance = () => balanceEl.textContent = `$${balance.toFixed(2)}`;

    // render the list of recent bets
    function renderRecentBets(bets){
      betsList.innerHTML = '';
      if (!bets || bets.length === 0) {
        betsList.innerHTML = '<p class="muted">No bets placed yet.</p>';
        return;
      }
      bets.forEach(bet => {
        const p = document.createElement('p');
        p.innerHTML = `<strong>${bet.market} — ${bet.side}</strong> — $${bet.stake.toFixed(2)} placed @ ${bet.odds} — <span class="muted">${bet.status||'pending'}</span>`;
        betsList.prepend(p);
      });
    }

    // builds inline markets given an array of market objects
    function buildInlineMarkets(markets){
      const marketsSection = document.getElementById('markets');
      if (!marketsSection) return;
      const grid = marketsSection.querySelector('.grid');
      if (grid) grid.remove();

      markets.forEach((market, idx)=>{
        const box = document.createElement('div');
        box.className = 'card market-card highlight highlight-corner';
        box.style.display = 'flex';
        box.style.gap = '0';
        box.style.alignItems = 'stretch';
        box.style.justifyContent = 'center';
        box.style.marginTop = '16px';
        box.style.overflow = 'hidden';
        box.style.borderRadius = '12px';

        const overBtnId = `btnOver${idx}`;
        const underBtnId = `btnUnder${idx}`;
        const stakeId = `stakeInput${idx}`;
        const titleId = `marketTitle${idx}`;
        const oddsId = `marketOdds${idx}`;

        box.innerHTML = `
          <div class="market-half" style="flex:1;padding:0;text-align:center;display:flex;flex-direction:column;align-items:stretch;justify-content:stretch;">
            <button class="btn under full" id="${underBtnId}" style="flex:1;border-radius:12px 0 0 12px;padding:36px 0;font-size:1.25rem;">Under</button>
          </div>
          <div style="flex:0 0 360px;padding:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--card-bg);">
            <h4 id="${titleId}">${market.title}</h4>
            <div class="muted" style="margin:8px 0">O/U <span id="${oddsId}">${market.odds}</span></div>
            <input id="${stakeId}" type="number" min="1" step="0.5" value="${market.defaultStake||5}" style="padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);width:160px;text-align:center;margin-bottom:12px;font-size:1rem;">
          </div>
          <div class="market-half" style="flex:1;padding:0;text-align:center;display:flex;flex-direction:column;align-items:stretch;justify-content:stretch;">
            <button class="btn over full" id="${overBtnId}" style="flex:1;border-radius:0 12px 12px 0;padding:36px 0;font-size:1.25rem;">Over</button>
          </div>
        `;

        marketsSection.appendChild(box);

        // handlers for placing inline bets
        const stakeInput = document.getElementById(stakeId);
        const odds = parseFloat(market.odds) || 1.0;
        const titleEl = document.getElementById(titleId);
        function placeInlineBet(side){
          const stake = parseFloat(stakeInput.value) || 0;
          if (stake <= 0){ alert('Enter a valid stake.'); return; }
          if (stake > balance){ alert('Insufficient balance.'); return; }
          balance -= stake; updateBalance();
          const betObj = { market: titleEl.textContent, side, stake, odds, status: 'pending' };
          recentBets.unshift(betObj);
          renderRecentBets(recentBets);
        }

        const elOver = document.getElementById(overBtnId);
        if (elOver) elOver.addEventListener('click', ()=> placeInlineBet('Over'));
        const elUnder = document.getElementById(underBtnId);
        if (elUnder) elUnder.addEventListener('click', ()=> placeInlineBet('Under'));
      });
    }

    // load JSON data and initialize UI
    async function loadData(){
      try {
        const res = await fetch('data/data.json');
        if (!res.ok) throw new Error(res.statusText);
        const json = await res.json();
        balance = parseFloat(json.balance) || balance;
        recentBets = json.recentBets || [];
        updateBalance();
        buildInlineMarkets(json.markets || []);
        renderRecentBets(recentBets);
      } catch(err){
        console.error('Unable to load data file:', err);
      }
    }

    // account quick buttons unchanged
    document.getElementById('placeBet').addEventListener('click', ()=> { const el = document.getElementById('stakeInput'); if(el) el.focus(); else alert('Use the Over/Under controls to place a bet.'); });
    document.getElementById('viewBets').addEventListener('click', ()=> alert('Recent bets are shown below.'));
    document.getElementById('deposit').addEventListener('click', ()=>{
      const amt = parseFloat(prompt('Deposit amount (USD):', '10')) || 0;
      if (amt <= 0) return alert('Canceled or invalid amount.');
      balance += amt; updateBalance(); alert(`Deposited $${amt.toFixed(2)}.`);
    });
    document.getElementById('withdraw').addEventListener('click', ()=>{
      const amt = parseFloat(prompt('Withdraw amount (USD):', '10')) || 0;
      if (amt <= 0) return alert('Canceled or invalid amount.');
      if (amt > balance) return alert('Insufficient balance.');
      balance -= amt; updateBalance(); alert(`Withdrew $${amt.toFixed(2)}.`);
    });

    loadData();
  </script>
</body>
</html>
